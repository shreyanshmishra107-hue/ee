<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="referrer" content="no-referrer">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Stream Player</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.6/controls.min.css" crossorigin="anonymous">
<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.6/shaka-player.ui.min.js" crossorigin="anonymous"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;background:#000;overflow:hidden;font-family:sans-serif;}

#wrap{position:absolute;inset:0;}
#video{width:100%;height:100%;}

.shaka-spinner-container{display:none!important;}

#loader{
position:fixed;inset:0;background:#000;z-index:999;
display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
transition:opacity .4s;
}

#loader.gone{opacity:0;pointer-events:none;}

#ring{
width:42px;height:42px;
border:3px solid rgba(232,255,71,.12);
border-top-color:#e8ff47;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{to{transform:rotate(360deg)}}

#llbl{
font-size:11px;
font-weight:800;
letter-spacing:.12em;
color:rgba(255,255,255,.25);
}

#wm{
position:fixed;
top:12px;
right:08px;
z-index:900;
display:flex;
align-items:center;
gap:6px;
background:rgba(0,136,204,.18);
backdrop-filter:blur(8px);
border:1px solid rgba(0,136,204,.28);
padding:6px 11px;
border-radius:7px;
color:#fff;
font-size:12px;
font-weight:700;
text-decoration:none;
}
</style>
</head>

<body>

<a href="https://t.me/+7VkflslOE9s4YjQ9" target="_blank" id="wm">
@OffsideVerse
</a>

<div id="wrap" data-shaka-player-container>
<video autoplay playsinline data-shaka-player id="video"></video>
</div>

<div id="loader">
<div id="ring"></div>
<div id="llbl">LOADING STREAM</div>
</div>

<script>

let started=false;

async function initPlayer(){

const v=document.getElementById('video');

if(!v.ui){
setTimeout(initPlayer,80);
return;
}

const p=v.ui.getControls().getPlayer();

const params=new URLSearchParams(window.location.search);
const id=params.get("id");

if(!id){
document.getElementById('llbl').textContent="NO STREAM ID";
return;
}

try{

const response=await fetch("https://offsideverse-jsonid.vercel.app/streams.json");

const data=await response.json();

if(!data[id]){
document.getElementById('llbl').textContent="STREAM NOT FOUND";
return;
}

const stream=data[id];

p.configure({
drm:{
clearKeys:{
[stream.kid]:stream.key
}
}
});

await p.load(stream.mpd);

document.getElementById('loader').classList.add('gone');

}catch(e){

console.error(e);
document.getElementById('llbl').textContent="STREAM FAILED";

}

}

initPlayer();

if('wakeLock' in navigator){
navigator.wakeLock.request('screen').catch(()=>{});
}

</script>

</body>
</html>
