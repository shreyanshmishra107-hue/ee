<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="referrer" content="no-referrer">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>OffsideVerse Player</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.6/controls.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.6/shaka-player.ui.min.js"></script>

<style>

*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;background:#000;overflow:hidden;font-family:sans-serif;}

#wrap{position:absolute;inset:0;}
#video{width:100%;height:100%;}

.shaka-spinner-container{display:none!important;}

#loader{
position:fixed;
inset:0;
background:#000;
z-index:999;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:14px;
}

#ring{
width:42px;
height:42px;
border:3px solid rgba(232,255,71,.12);
border-top-color:#e8ff47;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{to{transform:rotate(360deg)}}

#llbl{
font-size:11px;
font-weight:800;
letter-spacing:.12em;
color:rgba(255,255,255,.25);
}

/* TELEGRAM POPUP */

.modal{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(8px);
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
opacity:0;
visibility:hidden;
transition:all .3s ease;
}

.modal.show{
opacity:1;
visibility:visible;
}

.modal-content{
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.1);
border-radius:20px;
padding:30px 25px;
width:90%;
max-width:400px;
text-align:center;
color:#fff;
backdrop-filter:blur(12px);
}

.modal-content h2{
color:#facc15;
margin-bottom:15px;
}

.modal-content p{
color:#d1d5db;
margin-bottom:20px;
}

.btn{
width:100%;
padding:12px;
border:none;
border-radius:12px;
margin-bottom:10px;
cursor:pointer;
font-size:15px;
}

#joinButton{
background:linear-gradient(to right,#3b82f6,#06b6d4);
color:#fff;
}

#closeButton{
background:rgba(255,255,255,0.1);
color:#fff;
}

#wm{
position:fixed;
top:12px;
right:12px;
z-index:900;
background:rgba(0,136,204,.2);
padding:6px 10px;
border-radius:6px;
font-size:12px;
color:#fff;
text-decoration:none;
}

</style>
</head>

<body>

<a href="https://t.me/SportsEera" target="_blank" id="wm">@footstersreal</a>

<!-- TELEGRAM POPUP -->

<div id="telegramModal" class="modal">
<div class="modal-content">

<h2>Join our Telegram</h2>
<p>Stay updated with the latest <strong>Live Match Links</strong> and updates.</p>

<a href="https://t.me/SportsEera" target="_blank" style="text-decoration:none;">
<button id="joinButton" class="btn">Join Telegram</button>
</a>

<button id="closeButton" class="btn">Maybe Later</button>

</div>
</div>

<!-- PLAYER -->

<div id="wrap" data-shaka-player-container>
<video autoplay playsinline data-shaka-player id="video"></video>
</div>

<div id="loader">
<div id="ring"></div>
<div id="llbl">LOADING STREAM</div>
</div>

<script>

/* POPUP */

const modal=document.getElementById("telegramModal");

setTimeout(()=>{
modal.classList.add("show");
},2000);

document.getElementById("closeButton").onclick=function(){
modal.classList.remove("show");
};

/* PLAYER */

async function initPlayer(){

const v=document.getElementById("video");

if(!v.ui){
setTimeout(initPlayer,80);
return;
}

const p=v.ui.getControls().getPlayer();

const params=new URLSearchParams(window.location.search);
const id=params.get("id");

if(!id){
document.getElementById("llbl").textContent="NO STREAM ID";
return;
}

try{

const response=await fetch("https://offsideverse-jsonid.vercel.app/streams.json");
const data=await response.json();

if(!data[id]){
document.getElementById("llbl").textContent="STREAM NOT FOUND";
return;
}

const stream=data[id];

p.configure({
drm:{
clearKeys:{
[stream.kid]:stream.key
}
}
});

await p.load(stream.mpd);

document.getElementById("loader").style.display="none";

}catch(e){

console.error(e);
document.getElementById("llbl").textContent="STREAM FAILED";

}

}

initPlayer();

if("wakeLock" in navigator){
navigator.wakeLock.request("screen").catch(()=>{});
}

</script>

</body>
</html>
